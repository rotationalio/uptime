root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = ["serve"]
  bin = "./tmp/bin/uptime"
  cmd = "go build -ldflags=\"-X 'go.rtnl.ai/uptime/pkg.GitVersion=$(git rev-parse --short HEAD)'\" -o ./tmp/bin/uptime ./cmd/uptime"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "dev", ".github", ".vscode"]
  exclude_file = ["docker-compose.yaml", "Dockerfile", ".dockerignore", ".gitignore", ".env.template"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "js", "css", "json", "yaml"]
  include_file = [".env"]
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
